name: PRLifeMobile
options:
  bundleIdPrefix: com.pramitranjan.prlife
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
packages:
  PRLifeKit:
    path: .
targets:
  PRLifeMobile:
    type: application
    platform: iOS
    sources:
      - App
    dependencies:
      - package: PRLifeKit
      - target: PRLifeWidgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pramitranjan.prlife
        INFOPLIST_FILE: App/Resources/Info.plist
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 8QBV8WL699
        CODE_SIGN_ENTITLEMENTS: App/PRLifeMobile.entitlements
  PRLifeWidgets:
    type: app-extension
    platform: iOS
    sources:
      - Widgets
      - path: App/Activity/RecordingAttributes.swift
      - path: App/Intents/StopCaptureIntent.swift
      - path: App/Net/KeychainConfig.swift
    dependencies:
      - package: PRLifeKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pramitranjan.prlife.widgets
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Widgets/Info.plist
        DEVELOPMENT_TEAM: 8QBV8WL699
        CODE_SIGN_ENTITLEMENTS: Widgets/PRLifeWidgets.entitlements
  PRLifeMac:
    type: application
    platform: macOS
    sources:
      - MacApp
      - path: App/Net/KeychainConfig.swift
    dependencies:
      - package: PRLifeKit
      - target: PRLifeMacWidgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pramitranjan.prlife.mac
        INFOPLIST_FILE: MacApp/Resources/Info.plist
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 8QBV8WL699
        CODE_SIGN_ENTITLEMENTS: MacApp/PRLifeMac.entitlements
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_HARDENED_RUNTIME: YES
  PRLifeMacWidgets:
    type: app-extension
    platform: macOS
    sources:
      - MacWidgets
      - path: MacApp/AppGroup.swift
      - path: MacApp/Theme/PRLifeTheme.swift
      - path: MacApp/FontRegistration.swift
      - path: MacApp/Support/LifeFormatting.swift
      - path: MacApp/Resources/Fonts
    dependencies:
      - package: PRLifeKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pramitranjan.prlife.mac.widgets
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: MacWidgets/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 8QBV8WL699
        CODE_SIGN_ENTITLEMENTS: MacWidgets/PRLifeMacWidgets.entitlements
        MACOSX_DEPLOYMENT_TARGET: "14.0"
schemes:
  PRLifeMobile:
    build:
      targets:
        PRLifeMobile: all
    run:
      config: Debug
    test:
      config: Debug
  PRLifeMac:
    build:
      targets:
        PRLifeMac: all
    run:
      config: Debug
